services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: dbt
      POSTGRES_PASSWORD: dbt
      POSTGRES_DB: analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbt -d analytics"]
      interval: 5s
      timeout: 5s
      retries: 10

  dbt:
    build: .
    container_name: dbt
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DBT_HOST: postgres
      DBT_PORT: 5432
      DBT_USER: dbt
      DBT_PASSWORD: dbt
      DBT_DBNAME: analytics
      DBT_SCHEMA: dbt
    volumes:
      - .:/usr/app
    working_dir: /usr/app
    ports:
      - "8080:8080"

volumes:
  postgres_data:
